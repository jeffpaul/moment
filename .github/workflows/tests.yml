name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Resolves the two WordPress versions every job tests against:
  #   stable    — the current release (X.Y from the official API)
  #   candidate — the highest RC of the NEXT version when one exists
  #               (release-candidate window), otherwise trunk (nightly).
  # During an RC window this means every PR — including the automated
  # tested-up-to bump PR from the WordPress Version Checker — tests against
  # the actual upcoming release, so green candidate legs mean the bump is
  # safe to merge ahead of the release date.
  resolve:
    name: Resolve WordPress versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      stable: ${{ steps.resolve.outputs.stable }}
      candidate: ${{ steps.resolve.outputs.candidate }}
      scratch-matrix: ${{ steps.resolve.outputs.scratch-matrix }}
      phpunit-matrix: ${{ steps.resolve.outputs.phpunit-matrix }}
    steps:
      - name: Resolve stable + candidate
        id: resolve
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import urllib.request

          def head_ok(url):
              request = urllib.request.Request(url, method='HEAD')
              try:
                  with urllib.request.urlopen(request) as response:
                      return response.status == 200
              except Exception:
                  return False

          with urllib.request.urlopen(
              'https://api.wordpress.org/core/version-check/1.7/'
          ) as response:
              offer = json.load(response)['offers'][0]['version']
          major, minor = (int(p) for p in offer.split('.')[:2])
          stable = f'{major}.{minor}'

          # WordPress versioning: X.9 is followed by (X+1).0.
          nxt = f'{major + 1}.0' if minor == 9 else f'{major}.{minor + 1}'

          candidate = 'nightly'
          for n in range(9, 0, -1):  # highest published RC wins
              if head_ok(f'https://wordpress.org/wordpress-{nxt}-RC{n}.zip'):
                  candidate = f'{nxt}-RC{n}'
                  break

          print(f'stable={stable}')
          print(f'candidate={candidate}')
          # Scratch installs use wp-cli's 'latest'; PHPUnit needs the explicit
          # stable number to pick the matching wordpress-develop branch.
          print(f'scratch-matrix={json.dumps(["latest", candidate])}')
          print(f'phpunit-matrix={json.dumps([stable, candidate])}')
          PY
          cat "$GITHUB_OUTPUT"

  phpunit:
    name: PHPUnit (WP ${{ matrix.wp }}, PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: resolve
    # Candidate legs (RC or trunk) are early warning for the next WordPress
    # release: failures show on the run but do not block merges.
    continue-on-error: ${{ matrix.wp != needs.resolve.outputs.stable }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.4']
        wp: ${{ fromJSON(needs.resolve.outputs.phpunit-matrix) }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, gd
          coverage: none
          tools: composer

      - name: Install WordPress test library (WP ${{ matrix.wp }})
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 '${{ matrix.wp }}' true

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: WP_TESTS_DIR=/tmp/wordpress-tests-lib composer test

  smoke:
    name: Smoke suite (WP ${{ matrix.wp }}, live install)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: resolve
    # Candidate legs (RC or trunk) are early warning; non-blocking.
    continue-on-error: ${{ matrix.wp != 'latest' }}
    strategy:
      fail-fast: false
      matrix:
        wp: ${{ fromJSON(needs.resolve.outputs.scratch-matrix) }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wp_smoke
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP + WP-CLI
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, gd
          coverage: none
          tools: wp-cli

      - name: Install scratch WordPress (${{ matrix.wp }})
        run: |
          bash bin/download-wp.sh '${{ matrix.wp }}' /tmp/wp
          wp config create --path=/tmp/wp --dbname=wp_smoke --dbuser=root --dbpass=root --dbhost=127.0.0.1
          wp core install --path=/tmp/wp --url=http://smoke.test --title=Smoke \
            --admin_user=admin --admin_password=admin --admin_email=admin@smoke.test --skip-email

      - name: Link and activate the plugin
        run: |
          ln -s "$GITHUB_WORKSPACE" /tmp/wp/wp-content/plugins/moment
          wp plugin activate moment --path=/tmp/wp

      - name: Run smoke suite (57 assertions, E2E scenarios 1-10)
        run: |
          printf '#!/bin/bash\nexec wp --path=/tmp/wp "$@"\n' > "$RUNNER_TEMP/wpx"
          chmod +x "$RUNNER_TEMP/wpx"
          WP="$RUNNER_TEMP/wpx" bash tests/smoke.sh

  playwright:
    name: Browser E2E (Playwright, WP ${{ matrix.wp }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: resolve
    # Candidate legs (RC or trunk) are early warning; non-blocking.
    continue-on-error: ${{ matrix.wp != 'latest' }}
    strategy:
      fail-fast: false
      matrix:
        wp: ${{ fromJSON(needs.resolve.outputs.scratch-matrix) }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wp_e2e
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP + WP-CLI
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, gd
          coverage: none
          tools: wp-cli

      - name: Install scratch WordPress (${{ matrix.wp }})
        run: |
          bash bin/download-wp.sh '${{ matrix.wp }}' /tmp/wp
          wp config create --path=/tmp/wp --dbname=wp_e2e --dbuser=root --dbpass=root --dbhost=127.0.0.1
          wp core install --path=/tmp/wp --url=http://127.0.0.1:8889 --title=E2E \
            --admin_user=admin --admin_password=admin --admin_email=admin@e2e.test --skip-email
          # /moment and the section pages need pretty permalinks in a browser.
          wp rewrite structure '/%postname%/' --path=/tmp/wp

      - name: Link and activate the plugin
        run: |
          ln -s "$GITHUB_WORKSPACE" /tmp/wp/wp-content/plugins/moment
          wp plugin activate moment --path=/tmp/wp
          wp rewrite flush --path=/tmp/wp
          # Demo mode: the publish screen hides unconnected networks by
          # default; the E2E suite asserts against the mocked connectors.
          mkdir -p /tmp/wp/wp-content/mu-plugins
          printf '<?php add_filter( "moment_show_unconnected_connectors", "__return_true" );\n' \
            > /tmp/wp/wp-content/mu-plugins/moment-demo-mode.php

      - name: Start web server
        run: |
          wp server --host=127.0.0.1 --port=8889 --path=/tmp/wp &
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://127.0.0.1:8889/wp-login.php && break
            sleep 1
          done
          curl -sf -o /dev/null http://127.0.0.1:8889/wp-login.php

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run browser E2E
        env:
          WP_BASE_URL: http://127.0.0.1:8889
          WP_ADMIN_USER: admin
          WP_ADMIN_PASS: admin
        run: npx playwright test

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.wp }}
          path: test-results/
          retention-days: 7
