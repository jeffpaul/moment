name: Release

# Tag-driven release: pushing a version tag (v0.1.0 or 0.1.0) builds the
# .distignore-filtered distribution zip via wp dist-archive and attaches it
# to a GitHub release — creating the release, or uploading to it if one
# was already drafted by hand for the tag. The zip is the artifact to install for testing and
# the exact tree that would be committed to the wordpress.org SVN trunk.
#
# Guard: the tag must match the plugin's declared version everywhere —
# moment.php header, MOMENT_VERSION, and readme.txt Stable tag — or the
# release fails before anything is published.

on:
  push:
    tags:
      - 'v[0-9]*'
      - '[0-9]*'

permissions: {}

jobs:
  release:
    name: Build dist zip and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches declared plugin version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          header=$(sed -n 's/^ \* Version: //p' moment.php)
          constant=$(sed -n "s/^define( 'MOMENT_VERSION', '\(.*\)' );$/\1/p" moment.php)
          stable=$(sed -n 's/^Stable tag: //p' readme.txt)
          echo "tag=$tag_version header=$header constant=$constant stable=$stable"
          for v in "$header" "$constant" "$stable"; do
            if [ "$v" != "$tag_version" ]; then
              echo "::error::Version mismatch: tag v$tag_version vs declared '$v'"
              exit 1
            fi
          done

      - name: Set up PHP
        uses: shivammathur/setup-php@0f7f1d08e3e32076e51cae65eb0b0c871405b16e # 2.34.1
        with:
          php-version: '8.3'
          tools: wp-cli

      - name: Build distribution zip
        run: |
          # Pinned: v3.2+ requires wp-cli ^2.13, which is not yet released —
          # v3.1.0 works with the wp-cli 2.12 that setup-php installs.
          wp package install wp-cli/dist-archive-command:v3.1.0
          wp dist-archive . "$PWD/moment.zip"
          unzip -l moment.zip

      - name: Guard the zip contents
        run: |
          listing=$(unzip -l moment.zip)
          echo "$listing" | grep -q 'moment/readme.txt' || { echo '::error::readme.txt missing from zip'; exit 1; }
          echo "$listing" | grep -q 'moment/moment.php' || { echo '::error::moment.php missing from zip'; exit 1; }
          for banned in 'moment/tests/' 'moment/docs/' 'moment/README.md' 'moment/CLAUDE.md' 'moment/node_modules/' 'moment/vendor/' 'moment/moment-connector-'; do
            if echo "$listing" | grep -q "$banned"; then
              echo "::error::dev file leaked into zip: $banned"
              exit 1
            fi
          done
          # Every file in the zip must be git-tracked — catches untracked
          # strays (build caches, local scratch files) .distignore missed.
          unzip -Z1 moment.zip | sed -n 's|^moment/||p' | grep -v '/$' | grep . | while read -r f; do
            git ls-files --error-unmatch "$f" >/dev/null 2>&1 || { echo "::error::untracked file in zip: $f"; exit 1; }
          done

      - name: Create GitHub release with zip attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" moment.zip --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" moment.zip \
              --repo "$GITHUB_REPOSITORY" \
              --title "Moment ${GITHUB_REF_NAME#v}" \
              --generate-notes
          fi
