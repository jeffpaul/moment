name: WordPress Version Checker

# Watches for the NEXT WordPress version reaching release-candidate stage
# (wordpress.org publishes wordpress-X.Y-RC1.zip). When an RC exists — or,
# as a fallback, when a final release shipped without the bump being merged —
# opens a PR that:
#   - bumps "Tested up to" to the upcoming/new version (README.md, readme.txt)
#   - bumps "Requires at least" to one release earlier (moment.php, README.md,
#     readme.txt, phpcs.xml.dist) per the latest-and-latest-minus-one
#     support policy
#
# The Tests workflow resolves its "candidate" matrix legs to the same RC
# build, so the PR's checks exercise the actual upcoming release: green
# candidate legs mean the bump is safe to merge ahead of (or timed to) the
# release date.
#
# NOTE: PRs opened with the default GITHUB_TOKEN do not trigger pull_request
# workflows (GitHub anti-recursion rule). Add a repo secret WPVC_TOKEN (a PAT
# with repo scope) to have checks run automatically; without it, close and
# reopen the PR once to kick off checks.

on:
  schedule:
    - cron: '0 9 * * 1' # Mondays 09:00 UTC
  workflow_dispatch:
    inputs:
      simulate_rc:
        description: 'Pretend an RC exists for this version (testing only, e.g. 7.1)'
        required: false
        type: string

permissions: {}

jobs:
  check-version:
    name: Check tested-up-to against the next WordPress RC
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Compare versions and apply bumps
        id: bump
        env:
          SIMULATE_RC: ${{ inputs.simulate_rc }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import re
          import urllib.request

          def parse(version):
              parts = version.split('.')
              return int(parts[0]), int(parts[1])

          def head_ok(url):
              request = urllib.request.Request(url, method='HEAD')
              try:
                  with urllib.request.urlopen(request) as response:
                      return response.status == 200
              except Exception:
                  return False

          with urllib.request.urlopen(
              'https://api.wordpress.org/core/version-check/1.7/'
          ) as response:
              offer = json.load(response)['offers'][0]['version']
          major, minor = (int(p) for p in offer.split('.')[:2])
          stable = f'{major}.{minor}'

          # WordPress versioning: X.9 is followed by (X+1).0.
          nxt = f'{major + 1}.0' if minor == 9 else f'{major}.{minor + 1}'

          simulate = (os.environ.get('SIMULATE_RC') or '').strip()
          rc_available = bool(simulate) or any(
              head_ok(f'https://wordpress.org/wordpress-{nxt}-RC{n}.zip')
              for n in range(1, 10)
          )
          if simulate:
              nxt = simulate

          # Target: the upcoming version once it hits RC; otherwise the
          # current stable (fallback for a release that shipped unmerged).
          target = nxt if rc_available else stable
          reason = 'release candidate available' if rc_available else 'stable release'

          readme = open('README.md').read()
          match = re.search(r'\*\*Tested up to:\*\* (\d+\.\d+)', readme)
          if not match:
              raise SystemExit('Could not find "Tested up to" in README.md')
          tested = match.group(1)

          if parse(tested) >= parse(target):
              print('needs_bump=false')
              print(f'# Up to date: tested {tested} >= target {target} ({reason})')
              raise SystemExit(0)

          t_major, t_minor = parse(target)
          # One release earlier; the release before X.0 is (X-1).9.
          minimum = f'{t_major - 1}.9' if t_minor == 0 else f'{t_major}.{t_minor - 1}'

          old_match = re.search(r'\*\*Requires at least:\*\* (\d+\.\d+)', readme)
          if not old_match:
              raise SystemExit('Could not find "Requires at least" in README.md')
          old_minimum = old_match.group(1)

          # README.md — header line + Requirements bullet.
          readme = readme.replace(f'**Tested up to:** {tested}', f'**Tested up to:** {target}')
          readme = readme.replace(
              f'**Requires at least:** {old_minimum}', f'**Requires at least:** {minimum}'
          )
          readme = readme.replace(f'- WordPress {old_minimum}+', f'- WordPress {minimum}+')
          open('README.md', 'w').write(readme)

          # readme.txt — wordpress.org header block.
          readme_txt = open('readme.txt').read()
          readme_txt = readme_txt.replace(f'Tested up to: {tested}', f'Tested up to: {target}')
          readme_txt = readme_txt.replace(
              f'Requires at least: {old_minimum}', f'Requires at least: {minimum}'
          )
          open('readme.txt', 'w').write(readme_txt)

          # moment.php — plugin header.
          plugin = open('moment.php').read()
          plugin = plugin.replace(
              f' * Requires at least: {old_minimum}', f' * Requires at least: {minimum}'
          )
          open('moment.php', 'w').write(plugin)

          # phpcs.xml.dist — WPCS minimum supported version.
          phpcs = open('phpcs.xml.dist').read()
          phpcs = phpcs.replace(
              f'<config name="minimum_wp_version" value="{old_minimum}"/>',
              f'<config name="minimum_wp_version" value="{minimum}"/>',
          )
          open('phpcs.xml.dist', 'w').write(phpcs)

          print('needs_bump=true')
          print(f'target={target}')
          print(f'minimum={minimum}')
          print(f'old_minimum={old_minimum}')
          print(f'reason={reason}')
          PY

      - name: Open version bump PR
        if: steps.bump.outputs.needs_bump == 'true'
        uses: peter-evans/create-pull-request@67ccf781d68cd99b580ae25a5c18a1cc84ffff1f # v7.0.6
        with:
          token: ${{ secrets.WPVC_TOKEN || github.token }}
          branch: automated/wp-${{ steps.bump.outputs.target }}-support
          delete-branch: true
          commit-message: |
            Declare support for WordPress ${{ steps.bump.outputs.target }}

            Tested up to: ${{ steps.bump.outputs.target }} (${{ steps.bump.outputs.reason }});
            Requires at least bumped ${{ steps.bump.outputs.old_minimum }} -> ${{ steps.bump.outputs.minimum }}
            per the latest-and-latest-minus-one support policy.
          title: 'Declare support for WordPress ${{ steps.bump.outputs.target }}'
          body: |
            WordPress ${{ steps.bump.outputs.target }} — ${{ steps.bump.outputs.reason }}. This automated PR:

            - Bumps **Tested up to** to `${{ steps.bump.outputs.target }}` (README.md, readme.txt)
            - Bumps **Requires at least** from `${{ steps.bump.outputs.old_minimum }}` to `${{ steps.bump.outputs.minimum }}` (moment.php, README.md, readme.txt, phpcs.xml.dist)

            The Tests workflow's candidate matrix legs resolve to the ${{ steps.bump.outputs.target }} release candidate while it exists, so the checks on this PR exercise the actual upcoming release.

            **Before merging:**
            - [ ] Confirm the candidate (RC) legs passed — green means safe to merge ahead of, or timed to, the ${{ steps.bump.outputs.target }} release
            - [ ] If checks did not start automatically, close and reopen this PR (PRs opened with the default token do not trigger workflows; add a `WPVC_TOKEN` repo secret to fix permanently)

            🤖 Generated by the WordPress Version Checker workflow
